name: Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── PR: single-arch smoke test (fast, no QEMU, no push) ────────────────────
  test-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build — amd64 smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=pr
          cache-to: type=gha,mode=max,scope=pr

  # ── main / tag: full multi-arch build + push (skip docs-only changes) ───────
  build-and-push:
    if: >
      github.event_name != 'pull_request' && (
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.ref, 'refs/tags/') ||
        !contains(toJson(github.event.commits.*.modified), 'README') &&
        !contains(toJson(github.event.commits.*.added), 'README') ||
        github.event_name == 'push'
      )
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.changed.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if only docs changed
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED"
          # 如果所有变更文件都是文档类，跳过镜像构建
          NON_DOCS=$(echo "$CHANGED" | grep -v -E '^(README.*|LICENSE|\.github/workflows/docker\.yml|docs/)' || true)
          if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Only documentation changed, skipping Docker build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # QEMU needed only for cross-compilation (arm64 on amd64 runner).
      - name: Set up QEMU
        if: steps.changed.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changed.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.changed.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.changed.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          username: luochend
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        if: steps.changed.outputs.skip != 'true'
        run: |
          echo "REPO_OWNER=${OWNER,,}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push
        if: steps.changed.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/tg-signpulse:latest
            ghcr.io/${{ env.REPO_OWNER }}/tg-signpulse:${{ github.sha }}
            luochend/tg-signpulse:latest
            luochend/tg-signpulse:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

  # ── Sync README to Docker Hub (runs on any README change) ──────────────────
  update-dockerhub-description:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: luochend
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: luochend/tg-signpulse
          readme-filepath: ./README.md
