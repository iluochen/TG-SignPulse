name: Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PR: single-arch smoke test (fast, no QEMU, no push) ────────────────────
  test-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build — amd64 smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha,scope=pr
          cache-to: type=gha,mode=max,scope=pr

  # ── main / tag: full multi-arch build + push ────────────────────────────────
  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU needed only for cross-compilation (arm64 on amd64 runner).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: luochend
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set build metadata
        run: |
          echo "REPO_OWNER=${OWNER,,}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/tg-signpulse:latest
            ghcr.io/${{ env.REPO_OWNER }}/tg-signpulse:${{ github.sha }}
            luochend/tg-signpulse:latest
            luochend/tg-signpulse:${{ github.sha }}
          # Inject build metadata so /api/version reflects each new image.
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          # Scope keeps PR and production caches separate.
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main
